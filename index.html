<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mil Finans</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f4f7fe;
            --primary: #0f172a;
            --accent: #e11d48;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        /* Analiz Kartı */
        .analysis-card {
            background: var(--card);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .total-box { text-align: center; margin-bottom: 20px; }
        .total-box small { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .total-box div { font-size: 32px; font-weight: 900; color: var(--primary); }

        .chart-row {
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 150px;
        }

        .chart-box { width: 130px; height: 130px; flex-shrink: 0; }
        
        /* Renk Anahtarı Listesi */
        .legend-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 140px;
            overflow-y: auto;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
        .legend-name { color: #64748b; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .legend-val { color: var(--primary); }

        /* Giriş ve Diğerleri */
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { padding: 12px; border-radius: 12px; border: none; font-weight: 700; background: var(--card); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .input-card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 14px; }
        .btn-add { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }

        .expense-item {
            background: var(--card);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
        }
        .ex-info b { font-size: 14px; display: block; }
        .ex-info small { font-size: 11px; color: #94a3b8; }
        .ex-amt { text-align: right; font-weight: 800; color: var(--accent); }
        .btn-del { border: none; background: none; color: #cbd5e1; font-size: 10px; font-weight: 800; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="analysis-card">
        <div class="total-box">
            <small id="ayLabel">MART GİDERLERİ</small>
            <div id="resTotal">₺0</div>
        </div>
        
        <div class="chart-row">
            <div class="chart-box">
                <canvas id="mainChart"></canvas>
            </div>
            <div id="legend" class="legend-box">
                </div>
        </div>
    </div>

    <div class="filters">
        <select id="fMonth" onchange="loadData()">
            <option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option>
            <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
            <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
            <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
        </select>
        <select id="fYear" onchange="loadData()"></select>
    </div>

    <div class="input-card">
        <input type="text" id="gDesc" placeholder="Harcama Başlığı (KİRA, MARKET...)">
        <input type="number" id="gAmount" placeholder="Tutar (₺)">
        <button class="btn-add" onclick="addExpense()">SİSTEME İŞLE</button>
    </div>

    <div id="expenseList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzS92_P_yDB50vb-MpRgbtnaj4aF8dzQA",
        authDomain: "miltakip.firebaseapp.com",
        projectId: "miltakip",
        databaseURL: "https://miltakip-default-rtdb.firebaseio.com",
        storageBucket: "miltakip.firebasestorage.app",
        messagingSenderId: "1033075543287",
        appId: "1:1033075543287:web:c02c56199db5ec70d517f2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const now = new Date();
    let myChart;
    const colors = ['#0f172a', '#e11d48', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];

    const yr = document.getElementById('fYear');
    for(let i = 2024; i <= 2027; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i;
        if(i === now.getFullYear()) opt.selected = true;
        yr.appendChild(opt);
    }
    document.getElementById('fMonth').value = now.getMonth() + 1;

    function addExpense() {
        const desc = document.getElementById('gDesc').value.trim().toUpperCase();
        const amt = parseFloat(document.getElementById('gAmount').value) || 0;
        const m = parseInt(document.getElementById('fMonth').value);
        const y = parseInt(document.getElementById('fYear').value);
        if(!desc || amt <= 0) return;
        
        db.ref("giderler/" + Date.now()).set({
            desc, amount: amt, m, y,
            date: new Date().toLocaleDateString('tr-TR', {day:'numeric', month:'short'})
        }).then(() => {
            document.getElementById('gDesc').value = '';
            document.getElementById('gAmount').value = '';
        });
    }

    function render(data) {
        const selM = parseInt(document.getElementById('fMonth').value);
        const selY = parseInt(document.getElementById('fYear').value);
        const list = document.getElementById('expenseList');
        const legend = document.getElementById('legend');
        list.innerHTML = ''; legend.innerHTML = '';

        let total = 0; let stats = {};

        if(data) {
            Object.entries(data).reverse().forEach(([id, g]) => {
                if(g.m === selM && g.y === selY) {
                    total += g.amount;
                    stats[g.desc] = (stats[g.desc] || 0) + g.amount;
                    list.innerHTML += `
                        <div class="expense-item">
                            <div class="ex-info"><b>${g.desc}</b><small>${g.date}</small></div>
                            <div class="ex-amt">₺${g.amount.toLocaleString()}<br><button class="btn-del" onclick="del('${id}')">SİL</button></div>
                        </div>`;
                }
            });
        }

        document.getElementById('resTotal').innerText = "₺" + total.toLocaleString();
        const aylar = ["", "OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
        document.getElementById('ayLabel').innerText = aylar[selM] + " GİDERLERİ";

        updateUI(stats);
    }

    function updateUI(stats) {
        const labels = Object.keys(stats);
        const vals = Object.values(stats);
        const legend = document.getElementById('legend');

        if(myChart) myChart.destroy();
        
        myChart = new Chart(document.getElementById('mainChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0 }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });

        labels.forEach((name, i) => {
            legend.innerHTML += `
                <div class="legend-item">
                    <div class="dot" style="background:${colors[i % colors.length]}"></div>
                    <div class="legend-name">${name}</div>
                    <div class="legend-val">₺${vals[i].toLocaleString()}</div>
                </div>`;
        });
    }

    function del(id) { if(confirm("Silinsin mi?")) db.ref("giderler/" + id).remove(); }
    function loadData() { db.ref("giderler").on("value", (snap) => render(snap.val())); }

    loadData();
</script>

</body>
</html>
